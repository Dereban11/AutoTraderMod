name: Build AutoTrader Mod

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: "-Xmx2048m -Xms1024m"
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      # Генерируем ТОЛЬКО маппинги, без распаковки и декомпиляции всего Minecraft.
      - name: Generate Mappings only (skipping heavy decompile)
        run: ./gradlew genMappings --no-daemon
        
      - name: Build with Gradle
        run: ./gradlew clean build --no-daemon
        
      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoTrader-Mod
          path: build/libs/*.jar
